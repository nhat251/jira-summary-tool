<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jira Summary Viewer</title>
    <!-- Use marked.js for Markdown to HTML conversion -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #0d1117;
            --bg-sidebar: #161b22;
            --bg-content: #0d1117;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --border-color: #30363d;
            --accent: #58a6ff;
            --bg-hover: rgba(88, 166, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
            font-size: 15px;
        }

        /* Sidebar Tree */
        .sidebar {
            width: 320px;
            min-width: 250px;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 24px 20px;
            font-weight: 600;
            font-size: 1.1em;
            color: #fff;
            border-bottom: 1px solid var(--border-color);
            letter-spacing: 0.5px;
        }

        .tree-container {
            padding: 16px 0;
        }

        .date-folder {
            padding: 10px 20px;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            user-select: none;
            transition: color 0.15s ease;
        }
        
        .date-folder:hover {
            color: var(--text-main);
        }

        .date-folder::before {
            content: '📂';
            margin-right: 10px;
            font-size: 1.1em;
            filter: grayscale(0.5);
        }

        .files-list {
            list-style: none;
            display: none; 
            margin-bottom: 10px;
        }

        .files-list.open {
            display: block;
        }

        .file-item {
            padding: 8px 20px 8px 48px;
            cursor: pointer;
            font-size: 0.95em;
            color: var(--text-main);
            transition: all 0.15s ease;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            position: relative;
        }

        .file-item:hover, .file-item.active {
            background-color: var(--bg-hover);
            color: var(--accent);
        }

        .file-item.active {
            font-weight: 500;
        }
        
        .file-item.active::after {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background-color: var(--accent);
        }
        
        .file-item::before {
            content: '📄';
            margin-right: 8px;
            filter: grayscale(0.8);
        }

        .file-item.active::before {
            filter: grayscale(0);
        }

        /* Content Area */
        .content {
            flex: 1;
            padding: 40px 60px;
            overflow-y: auto;
            background-color: var(--bg-content);
            scroll-behavior: smooth;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-muted);
            font-size: 1.1em;
        }
        
        .empty-state span {
            margin-top: 10px;
            font-size: 0.9em;
            opacity: 0.7;
        }

        /* Minimalist & Modern Markdown Typography */
        .markdown-body {
            max-width: 800px;
            margin: 0 auto;
            line-height: 1.65;
            color: var(--text-main);
        }

        .markdown-body h1, .markdown-body h2, .markdown-body h3 {
            color: #fff;
            margin-top: 2em;
            margin-bottom: 0.8em;
            font-weight: 600;
        }

        .markdown-body h1 { 
            font-size: 2.2em; 
            margin-top: 0;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.3em;
        }
        
        .markdown-body h2 { font-size: 1.5em; border-bottom: 1px solid var(--border-color); padding-bottom: 0.3em; margin-top: 1.5em;}
        .markdown-body h3 { font-size: 1.25em; margin-top: 1.3em;}

        .markdown-body p { margin-bottom: 1.2em; }

        .markdown-body ul, .markdown-body ol {
            margin-bottom: 1.2em;
            padding-left: 1.5em;
        }

        .markdown-body li {
            margin-bottom: 0.4em;
        }

        .markdown-body li > p {
            margin-bottom: 0.4em; /* less spacing inside lists */
        }

        .markdown-body code {
            background-color: rgba(110, 118, 129, 0.15);
            padding: 0.2em 0.4em;
            border-radius: 4px;
            font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
            font-size: 0.85em;
        }

        .markdown-body pre {
            background-color: var(--bg-sidebar);
            padding: 16px;
            border-radius: 8px;
            overflow-x: auto;
            border: 1px solid var(--border-color);
            margin-bottom: 1.2em;
        }

        .markdown-body pre code {
            background-color: transparent;
            padding: 0;
            font-size: 0.9em;
        }
        
        .markdown-body blockquote {
            border-left: 4px solid var(--border-color);
            padding-left: 1em;
            color: var(--text-muted);
            margin-bottom: 1.2em;
        }
        
        .markdown-body table {
            border-collapse: collapse;
            width: 100%;
            margin-bottom: 1.5em;
        }
        
        .markdown-body th, .markdown-body td {
            border: 1px solid var(--border-color);
            padding: 10px 14px;
            text-align: left;
        }

        .markdown-body th {
            background-color: rgba(255,255,255,0.03);
            font-weight: 600;
        }

        .markdown-body strong {
            color: #fff;
            font-weight: 600;
        }
        
        /* Smooth fade in */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .animate-fade {
            animation: fadeIn 0.3s ease forwards;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            Jira Summaries
        </div>
        <div class="tree-container" id="tree-container">
            <!-- Data rendered via JS -->
        </div>
    </div>
    <div class="content">
        <div id="content-display" class="markdown-body">
            <div class="empty-state">
                <div>Hãy chọn một tài liệu ở menu bên trái.</div>
                <span>Hỗ trợ thiết kế HTML & Markdown.</span>
            </div>
        </div>
    </div>

    <!-- Data file generated by Python script -->
    <script src="result/data.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const treeContainer = document.getElementById("tree-container");
            const contentDisplay = document.getElementById("content-display");

            // Reset default options for Marked to be safer
            marked.setOptions({
                gfm: true,
                breaks: true
            });

            if (typeof JIRA_RESULTS_DATA === 'undefined') {
                treeContainer.innerHTML = `
                    <div style="padding: 20px; color: var(--text-muted); font-size: 0.9em;">
                        Chưa tìm thấy dữ liệu.<br><br>
                        Hãy chạy lại <b>jira_issue_summarizer.py</b> để lấy nội dung.
                    </div>`;
                return;
            }

            // Render Sidebar Tree
            const dates = Object.keys(JIRA_RESULTS_DATA).sort((a, b) => {
                const parseDate = (dStr) => {
                    const parts = dStr.split('-');
                    if(parts.length >= 3) return new Date(`${parts[2]}-${parts[1]}-${parts[0]}`);
                    return 0;
                };
                return parseDate(b) - parseDate(a); // Newest first
            });

            dates.forEach((date, dateIndex) => {
                const folderWrapper = document.createElement('div');
                
                const folder = document.createElement('div');
                folder.className = 'date-folder';
                folder.innerText = date;
                
                const fileList = document.createElement('ul');
                fileList.className = 'files-list';

                const files = Object.keys(JIRA_RESULTS_DATA[date]);
                
                // Sort files so that combined summaries might appear first or just general alphabetical sort
                files.sort((a, b) => {
                    // Usually grouped files have underscores 
                    // Let's just sort alphabetically 
                    return a.localeCompare(b);
                });

                files.forEach(filename => {
                    const fileItem = document.createElement('li');
                    fileItem.className = 'file-item';
                    let displayName = filename.replace('.md', '');
                    fileItem.innerText = displayName;
                    fileItem.title = filename;

                    fileItem.onclick = () => {
                        // toggle active class
                        document.querySelectorAll('.file-item').forEach(el => el.classList.remove('active'));
                        fileItem.classList.add('active');

                        // parse markdown and display with animation
                        const mdContent = JIRA_RESULTS_DATA[date][filename];
                        contentDisplay.innerHTML = marked.parse(mdContent);
                        
                        // Add animation class
                        contentDisplay.classList.remove('animate-fade');
                        void contentDisplay.offsetWidth; // trigger reflow
                        contentDisplay.classList.add('animate-fade');
                    };

                    fileList.appendChild(fileItem);
                });

                folder.onclick = () => {
                    fileList.classList.toggle('open');
                };

                // Auto open the very first folder date
                if(dateIndex === 0) {
                    fileList.classList.add('open');
                }

                folderWrapper.appendChild(folder);
                folderWrapper.appendChild(fileList);
                treeContainer.appendChild(folderWrapper);
            });
        });
    </script>
</body>
</html>
